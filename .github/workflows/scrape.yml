name: Refresh deals

# Runs the scraper on a schedule and commits the refreshed JSON (+ price
# history DB) back to the repo, so a deployed instance pulling from `main`
# stays current without needing its own always-on scheduler.

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch: {}       # manual "Run workflow" button in the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/deals.json data/cheapshark_deals.json data/deals.db 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: refresh scraped deal data [skip ci]"
          git push
