services:
  - type: web
    name: game-deals-scraper
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python db.py"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
    disk:
      name: deal-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
